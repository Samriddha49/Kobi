version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  poetry-rag-critic:
    build: .
    ports:
      - "8501:8501"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - ./chroma_db:/app/chroma_db          # persist vector store
      - ./data:/app/data                     # mount poem PDFs
    depends_on:
      - ollama
    restart: unless-stopped

volumes:
  ollama_data:
